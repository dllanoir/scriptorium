<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptorium - Biblioteca de Textos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen">

    <!-- Menu móvel toggle -->
    <div id="mobile-menu-toggle" class="fixed top-4 left-4 z-50 md:hidden bg-[#25252c] p-2 rounded-lg shadow-lg cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </div>

    <div id="app" class="flex h-full w-full relative">
        <!-- Overlay para mobile -->
        <div id="mobile-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden"></div>

        <!-- PAINEL 1: COLEÇÕES (Sidebar) -->
        <aside class="fixed md:relative w-64 h-full flex-shrink-0 bg-[#25252c] p-4 flex flex-col z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
            <header class="mb-8 px-2 flex justify-between items-center">
                <h1 class="text-xl font-bold text-white">Scriptorium</h1>
                <button id="close-sidebar" class="md:hidden text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </header>
            <nav class="flex-grow overflow-y-auto">
                <h2 class="text-xs font-bold tracking-widest text-gray-500 mb-3 px-2">COLEÇÕES</h2>
                <ul id="collections-list" class="space-y-1">
                    <!-- Coleções serão inseridas aqui pelo JS -->
                </ul>
            </nav>
        </aside>

        <!-- PAINEL 2: LISTA DE TEXTOS -->
        <section class="w-full md:w-80 flex-shrink-0 border-l border-r border-[#3a3a4a] bg-[#1e1e24] flex flex-col md:relative fixed inset-y-0 transform translate-x-0 md:translate-x-0 transition-transform duration-300 ease-in-out z-30" id="text-list-section">
            <header class="pt-16 md:pt-4 px-4 pb-4 border-b border-[#3a3a4a] flex-shrink-0">
                <input type="search" id="search-box" placeholder="Procurar textos..." class="w-full bg-[#25252c] border border-[#4a4a5a] rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </header>
            <div id="text-list-container" class="flex-grow overflow-y-auto p-2">
                <!-- Textos da coleção selecionada serão inseridos aqui -->
            </div>
            <button id="back-to-reading" class="md:hidden w-full py-3 bg-[#25252c] text-white font-medium border-t border-[#3a3a4a]">
                Voltar para leitura
            </button>
        </section>

        <!-- PAINEL 3: ÁREA DE LEITURA -->
        <main class="flex-1 flex flex-col p-4 md:p-8 lg:p-12 overflow-y-auto relative">
            <div id="reading-pane" class="w-full max-w-3xl mx-auto">
                <div id="empty-state" class="hidden h-full items-center justify-center">
                    <div class="text-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-12 w-12 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <h3 class="mt-2 text-lg font-medium text-white">Nenhum texto selecionado</h3>
                        <p class="mt-1 text-sm text-gray-400">Selecione um texto da lista para ler.</p>
                    </div>
                </div>
                <div id="content-display">
                    <div class="flex justify-end md:hidden mb-4 px-2">
                        <button id="show-text-list" class="bg-[#25252c] text-white px-4 py-2 rounded-lg flex items-center shadow-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                            </svg>
                            Ver lista de textos
                        </button>
                    </div>
                    <h1 id="text-title" class="text-2xl md:text-3xl lg:text-4xl font-bold text-white mb-2"></h1>
                    <p id="text-date" class="text-sm md:text-base text-gray-400 mb-6 md:mb-8"></p>
                    <article id="text-body" class="prose prose-sm md:prose-base lg:prose-lg prose-invert max-w-none text-gray-300 leading-relaxed space-y-4">
                        <!-- Conteúdo do texto selecionado -->
                    </article>
                </div>
            </div>
        </main>

    </div>

    <script src="script.js" defer></script>

</body>
</html>

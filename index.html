<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Scriptorium - Um ambiente minimalista e focado para leitura e armazenamento de textos.">
    
    <!-- CSP Meta Tag for security -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://*.supabase.co; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://*.supabase.co;">
    
    <title>Scriptorium · Leituras e Coleções</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@350;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>
<body>

    <!-- Menu móvel toggle -->
    <div id="mobile-menu-toggle" aria-label="Abrir Menu">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </div>

    <div id="app">
        <!-- Overlay para mobile -->
        <div id="mobile-overlay" class="hidden"></div>

        <!-- PAINEL 1: COLEÇÕES (Sidebar) -->
        <aside class="-translate-x-full">
            <header>
                <div class="brand">
                    <svg viewBox="0 0 24 24" fill="none" class="brand-icon" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <h1>Scriptorium</h1>
                </div>
                <button id="close-sidebar" aria-label="Fechar Coleções">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </header>
            
            <button id="new-text-button" class="btn btn-primary" style="display: none;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                <span>Novo Texto</span>
            </button>
            
            <nav aria-label="Coleções">
                <h2>COLEÇÕES</h2>
                <ul id="collections-list">
                    <!-- Coleções serão inseridas aqui pelo JS -->
                    <li class="collection-item skeleton-loader" style="height: 36px; border-radius: 8px;"></li>
                    <li class="collection-item skeleton-loader" style="height: 36px; border-radius: 8px;"></li>
                </ul>
            </nav>
            
            <footer>
                <div id="user-info" class="hidden">
                    <p id="user-email" class="text-sm"></p>
                </div>
                <button id="auth-button" class="btn btn-secondary">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m-3 0l-3-3m0 0l3-3m-3 3h12" />
                    </svg>
                    <span>Login</span>
                </button>
            </footer>
        </aside>

        <!-- PAINEL 2: LISTA DE TEXTOS -->
        <section id="text-list-section">
            <header>
                <div class="search-container">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input type="search" id="search-box" placeholder="Procurar textos..." aria-label="Procurar textos">
                </div>
            </header>
            
            <div id="text-list-container">
                <!-- Textos da coleção selecionada serão inseridos aqui -->
                <div class="text-item skeleton-loader" style="height: 70px; margin-bottom: 8px; border-radius: 8px;"></div>
                <div class="text-item skeleton-loader" style="height: 70px; margin-bottom: 8px; border-radius: 8px;"></div>
                <div class="text-item skeleton-loader" style="height: 70px; margin-bottom: 8px; border-radius: 8px;"></div>
            </div>
            
            <button id="back-to-reading" class="btn btn-ghost">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="20" height="20" style="margin-right: 8px">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
                Voltar
            </button>
        </section>

        <!-- PAINEL 3: ÁREA DE LEITURA -->
        <main>
            <div id="reading-pane">
                
                <div id="empty-state" class="state-container hidden">
                    <div class="state-content">
                        <div class="state-icon-bg">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" />
                            </svg>
                        </div>
                        <h3>Nenhum texto selecionado</h3>
                        <p>Selecione um texto na lista para começar a leitura, ou refine sua busca.</p>
                    </div>
                </div>

                <div id="error-state" class="state-container hidden">
                    <div class="state-content error-content">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                        <h3>Ops! Algo deu errado</h3>
                        <p id="error-message">Não foi possível carregar os dados.</p>
                        <button id="retry-button" class="btn btn-secondary mt-4">Tentar Novamente</button>
                    </div>
                </div>

                <div id="content-display" class="hidden">
                    <div class="show-text-list-container">
                        <button id="show-text-list" class="btn btn-ghost" aria-label="Ver lista">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                            </svg>
                            Ver lista de textos
                        </button>
                    </div>
                    
                    <header class="content-header">
                        <h1 id="text-title"></h1>
                        <time id="text-date" datetime=""></time>
                    </header>
                    <article id="text-body" class="prose">
                        <!-- Conteúdo do texto selecionado -->
                    </article>
                </div>
            </div>
        </main>
    </div>

    <!-- TELA DE LOGIN -->
    <dialog id="login-modal" class="modal">
        <div class="modal-overlay" data-close="login-modal"></div>
        <div class="modal-container">
            <button class="close-modal-button" data-close="login-modal" aria-label="Fechar">&times;</button>
            <form id="login-form">
                <div class="modal-header">
                    <h2>Acesso Restrito</h2>
                    <p>Faça login para gerenciar a biblioteca.</p>
                </div>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary w-full">Entrar</button>
                <div id="login-error" class="hidden error-text"></div>
            </form>
        </div>
    </dialog>

    <!-- TELA DE NOVO TEXTO -->
    <dialog id="new-text-modal" class="modal">
        <div class="modal-overlay" data-close="new-text-modal"></div>
        <div class="modal-container modal-large">
            <button class="close-modal-button" data-close="new-text-modal" aria-label="Fechar">&times;</button>
            <form id="new-text-form">
                <div class="modal-header">
                    <h2>Novo Texto</h2>
                    <p>Adicione um novo artigo à coleção.</p>
                </div>
                
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="new-title">Título</label>
                        <input type="text" id="new-title" required placeholder="Digite o título da obra">
                    </div>
                    <div class="form-group flex-1">
                        <label for="new-collection">Coleção</label>
                        <div class="select-wrapper">
                            <select id="new-collection" required></select>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="new-content">Conteúdo</label>
                    <textarea id="new-content" rows="12" required placeholder="Escreva o conteúdo (tags <strong> e <em> são permitidas)"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-ghost" data-close="new-text-modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Publicar</button>
                </div>
            </form>
        </div>
    </dialog>
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="config.js" defer></script>
    <script src="script.js" defer></script>
</body>
</html>

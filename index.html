<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scriptorium - Biblioteca de Textos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- Menu móvel toggle -->
    <div id="mobile-menu-toggle">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </div>

    <div id="app">
        <!-- Overlay para mobile -->
        <div id="mobile-overlay" class="hidden"></div>

        <!-- PAINEL 1: COLEÇÕES (Sidebar) -->
        <aside class="-translate-x-full">
            <header>
                <h1>Scriptorium</h1>
                <button id="close-sidebar">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </header>
            <nav>
                <h2>COLEÇÕES</h2>
                <ul id="collections-list">
                    <!-- Coleções serão inseridas aqui pelo JS -->
                </ul>
            </nav>
            <footer>
                <button id="auth-button"></button>
            </footer>
        </aside>

        <!-- PAINEL 2: LISTA DE TEXTOS -->
        <section id="text-list-section">
            <header>
                <input type="search" id="search-box" placeholder="Procurar textos...">
            </header>
            <div id="text-list-container">
                <!-- Textos da coleção selecionada serão inseridos aqui -->
            </div>
            <button id="back-to-reading">
                Voltar para leitura
            </button>
        </section>

        <!-- PAINEL 3: ÁREA DE LEITURA -->
        <main>
            <div id="reading-pane">
                <div id="empty-state">
                    <div>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <h3>Nenhum texto selecionado</h3>
                        <p>Selecione um texto da lista para ler.</p>
                    </div>
                </div>
                <div id="content-display">
                    <div class="show-text-list-container">
                        <button id="show-text-list">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                            </svg>
                            Ver lista de textos
                        </button>
                    </div>
                    <h1 id="text-title"></h1>
                    <p id="text-date"></p>
                    <article id="text-body">
                        <!-- Conteúdo do texto selecionado -->
                    </article>
                </div>
            </div>
        </main>

    </div>

    <!-- TELA DE LOGIN -->
    <div id="login-modal">
        <div id="login-overlay"></div>
        <div id="login-container">
            <button id="close-login-button">&times;</button>
            <form id="login-form">
                <h2>Login</h2>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit">Entrar</button>
                <p id="login-error" class="hidden"></p>
            </form>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="script.js" defer></script>
</body>
</html>

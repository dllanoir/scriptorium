# .github/workflows/deploy.yml

name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # ADICIONE ESTA SEÇÃO DE PERMISSÕES
    permissions:
      contents: write

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3

      - name: Debug and Replace Credentials 🕵️
        run: |
          echo "Verificando se o arquivo script.js existe..."
          ls -l script.js
          
          echo "--- Conteúdo do script.js ANTES da substituição ---"
          cat script.js
          echo "----------------------------------------------------"

          # Este bloco vai falhar o workflow se os secrets estiverem vazios, nos dando um erro claro.
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "ERRO: O secret SUPABASE_URL não está definido ou está vazio."
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "ERRO: O secret SUPABASE_ANON_KEY não está definido ou está vazio."
            exit 1
          fi
          echo "Secrets encontrados. Tentando a substituição..."

          # Comando de substituição
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" script.js
          sed -i "s|__SUPABASE_ANON_KEY__|${{ secrets.SUPABASE_ANON_KEY }}|g" script.js
          
          echo "--- Conteúdo do script.js DEPOIS da substituição ---"
          cat script.js
          echo "----------------------------------------------------"
        
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
